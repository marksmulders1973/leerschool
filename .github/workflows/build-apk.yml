name: Build Android APK (TWA)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create twa-manifest.json
        run: |
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "online.studiebol.app",
            "host": "studiebol.online",
            "name": "Studiebol",
            "launcherName": "Studiebol",
            "display": "standalone",
            "themeColor": "#00c853",
            "navigationColor": "#0a1220",
            "backgroundColor": "#0a1220",
            "startUrl": "/",
            "iconUrl": "https://studiebol.online/icons/icon-512.png",
            "maskableIconUrl": "https://studiebol.online/icons/icon-512.png",
            "appVersionCode": 1,
            "appVersionName": "1.0.0",
            "signingKey": {
              "path": "keystore.ks",
              "alias": "studiebol"
            },
            "minSdkVersion": 21,
            "targetSdkVersion": 34,
            "orientation": "portrait",
            "sdkVersion": 3
          }
          EOF

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore keystore.ks \
            -alias studiebol \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass studiebol123 \
            -keypass studiebol123 \
            -dname "CN=Studiebol, OU=Smulsoft, O=Smulsoft, L=NL, S=NL, C=NL"

      - name: Configure Bubblewrap (skip interactive prompts)
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\": \"$JAVA_HOME\", \"androidSdkPath\": \"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Build APK with Bubblewrap
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: |
          bubblewrap build \
            --skipPwaValidation \
            --manifest twa-manifest.json \
            --signingKeyPath keystore.ks \
            --signingKeyAlias studiebol \
            --signingKeyStorePassword studiebol123 \
            --signingKeyPassword studiebol123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: studiebol-apk
          path: |
            app-release-signed.apk
            app-release-bundle.aab
          retention-days: 30
