name: Build Android APK (TWA)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap paths
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\": \"$JAVA_HOME\", \"androidSdkPath\": \"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json

      - name: Init Bubblewrap project
        run: |
          mkdir twa-project && cd twa-project
          # Beantwoord alle prompts automatisch met defaults (en 'n' voor JDK install)
          printf 'n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n' | \
            bubblewrap init --manifest https://studiebol.online/manifest.json || true

      - name: Check wat er aangemaakt is
        run: ls -la twa-project/ && cat twa-project/twa-manifest.json 2>/dev/null || echo "geen manifest"

      - name: Generate keystore
        run: |
          cd twa-project
          keytool -genkey -v \
            -keystore keystore.ks \
            -alias studiebol \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass studiebol123 -keypass studiebol123 \
            -dname "CN=Studiebol, OU=Smulsoft, O=Smulsoft, L=NL, S=NL, C=NL"

      - name: Build APK
        run: |
          cd twa-project
          printf 'y\n' | bubblewrap build \
            --signingKeyPath keystore.ks \
            --signingKeyAlias studiebol \
            --signingKeyStorePassword studiebol123 \
            --signingKeyPassword studiebol123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: studiebol-apk
          path: |
            twa-project/app-release-signed.apk
            twa-project/app-release-bundle.aab
          retention-days: 30
