name: Build Android APK (TWA)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Create Bubblewrap config
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF

      - name: Create twa-manifest.json directly
        run: |
          mkdir twa-project && cd twa-project
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "online.studiebol.app",
            "host": "studiebol.online",
            "name": "Studiebol",
            "launcherName": "Studiebol",
            "display": "standalone",
            "themeColor": "#00c853",
            "navigationColor": "#0a1220",
            "navigationColorDark": "#0a1220",
            "navigationDividerColor": "#0a1220",
            "navigationDividerColorDark": "#0a1220",
            "backgroundColor": "#0a1220",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://studiebol.online/icons/icon-512.png",
            "maskableIconUrl": "https://studiebol.online/icons/icon-512.png",
            "monochromeIconUrl": "https://studiebol.online/icons/icon-512.png",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "./keystore.ks",
              "alias": "studiebol"
            },
            "appVersionCode": 1,
            "appVersionName": "1.0.0",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://studiebol.online/manifest.json",
            "sdkVersion": 3,
            "minSdkVersion": 21,
            "targetSdkVersion": 34,
            "orientation": "portrait",
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://studiebol.online/",
            "fingerprints": [],
            "additionalTrustedOrigins": [],
            "retainedBundles": [],
            "serviceAccountJsonFile": ""
          }
          EOF

      - name: Bubblewrap update (init project from manifest)
        run: |
          cd twa-project
          bubblewrap update --skipPwaValidation

      - name: Generate keystore
        run: |
          cd twa-project
          keytool -genkey -v \
            -keystore keystore.ks \
            -alias studiebol \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass studiebol123 -keypass studiebol123 \
            -dname "CN=Studiebol, OU=Smulsoft, O=Smulsoft, L=NL, S=NL, C=NL"

      - name: Build APK
        run: |
          cd twa-project
          bubblewrap build \
            --skipPwaValidation \
            --signingKeyPath ./keystore.ks \
            --signingKeyAlias studiebol \
            --signingKeyStorePassword studiebol123 \
            --signingKeyPassword studiebol123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: studiebol-apk
          path: |
            twa-project/app-release-signed.apk
            twa-project/app-release-bundle.aab
          retention-days: 30
