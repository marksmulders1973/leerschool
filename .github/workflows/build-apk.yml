name: Build Android APK (TWA)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create TWA Android project
        run: |
          mkdir -p twa/app/src/main/java/online/studiebol/app
          mkdir -p twa/app/src/main/res/values
          mkdir -p twa/app/src/main/res/mipmap-xxxhdpi
          mkdir -p twa/gradle/wrapper

          # Download icon
          curl -s "https://studiebol.online/icons/icon-512.png" -o twa/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          # settings.gradle
          cat > twa/settings.gradle << 'EOF'
          rootProject.name = "Studiebol"
          include ':app'
          EOF

          # root build.gradle
          cat > twa/build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

          # app/build.gradle
          cat > twa/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              compileSdk 34
              namespace "online.studiebol.app"
              defaultConfig {
                  applicationId "online.studiebol.app"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }
              signingConfigs {
                  release {
                      storeFile file("../keystore.ks")
                      storePassword "studiebol123"
                      keyAlias "studiebol"
                      keyPassword "studiebol123"
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          EOF

          # AndroidManifest.xml
          cat > twa/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="Studiebol"
                  android:icon="@mipmap/ic_launcher"
                  android:theme="@style/Theme.App">
                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true">
                      <meta-data
                          android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="https://studiebol.online" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                          android:resource="@color/colorPrimary" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.SPLASH_SCREEN_BACKGROUND_COLOR"
                          android:resource="@color/backgroundColor" />
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW"/>
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE"/>
                          <data android:scheme="https" android:host="studiebol.online"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # colors.xml
          cat > twa/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#00c853</color>
              <color name="backgroundColor">#0a1220</color>
          </resources>
          EOF

          # styles.xml
          cat > twa/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.App" parent="android:Theme.NoTitleBar.Fullscreen">
                  <item name="android:windowBackground">@color/backgroundColor</item>
              </style>
          </resources>
          EOF

          # gradle wrapper properties
          cat > twa/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # gradle wrapper jar (download)
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
            -o twa/gradle/wrapper/gradle-wrapper.jar 2>/dev/null || true

          # gradlew script
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew" \
            -o twa/gradlew && chmod +x twa/gradlew

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore twa/keystore.ks \
            -alias studiebol \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass studiebol123 -keypass studiebol123 \
            -dname "CN=Studiebol, OU=Smulsoft, O=Smulsoft, L=NL, S=NL, C=NL"

      - name: Build APK
        run: |
          cd twa
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: studiebol-apk
          path: twa/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
