<!DOCTYPE html>
<html>
<head><title>Icoon generator — Studiebol</title></head>
<body style="background:#0a1220;color:#fff;font-family:sans-serif;padding:40px;text-align:center">
  <h2 style="color:#00e676">Studiebol icoon generator</h2>
  <p>Klik op de knop om het 512×512 PNG-icoon te downloaden.</p>
  <button onclick="generate()" style="background:#00c853;color:#000;border:none;padding:14px 28px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;margin-top:16px">
    📥 Download icon-512.png
  </button>
  <br/><br/>
  <canvas id="c" width="512" height="512" style="border-radius:20px;margin-top:16px"></canvas>

  <script>
    function generate() {
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");

      // Achtergrond
      const bg = ctx.createRadialGradient(256, 180, 20, 256, 180, 320);
      bg.addColorStop(0, "#1a2f50");
      bg.addColorStop(1, "#0a1220");
      ctx.fillStyle = bg;
      roundRect(ctx, 0, 0, 512, 512, 80);
      ctx.fill();

      // Gloed
      const glow = ctx.createRadialGradient(256, 220, 0, 256, 220, 200);
      glow.addColorStop(0, "rgba(0,230,118,0.25)");
      glow.addColorStop(1, "rgba(0,230,118,0)");
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, 512, 512);

      // Afstudeerhoed bord
      ctx.fillStyle = "#00c853";
      roundRect(ctx, 110, 210, 292, 34, 8);
      ctx.fill();

      // Afstudeerhoed bol
      ctx.fillStyle = "#00e676";
      ctx.beginPath();
      ctx.moveTo(256, 130);
      ctx.lineTo(120, 210);
      ctx.lineTo(256, 242);
      ctx.lineTo(392, 210);
      ctx.closePath();
      ctx.fill();

      // Kwastje
      ctx.strokeStyle = "#00c853";
      ctx.lineWidth = 7;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(392, 210);
      ctx.lineTo(392, 268);
      ctx.stroke();
      ctx.fillStyle = "#00c853";
      ctx.beginPath();
      ctx.arc(392, 280, 13, 0, Math.PI * 2);
      ctx.fill();

      // Tekst
      ctx.textAlign = "center";
      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 72px Arial";
      ctx.fillText("studie", 256, 360);
      ctx.fillStyle = "#00e676";
      ctx.fillText("bol", 256, 436);

      // Download
      const link = document.createElement("a");
      link.download = "icon-512.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arcTo(x + w, y, x + w, y + r, r);
      ctx.lineTo(x + w, y + h - r);
      ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h);
      ctx.arcTo(x, y + h, x, y + h - r, r);
      ctx.lineTo(x, y + r);
      ctx.arcTo(x, y, x + r, y, r);
      ctx.closePath();
    }

    // Toon preview direct
    window.onload = generate;
  </script>
</body>
</html>
